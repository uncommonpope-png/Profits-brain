<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="400" fill="#0D1117" rx="20"/>

  <!-- The PLT Triangle (Trinity) -->
  <path d="M 200 80 L 320 300 L 80 300 Z" fill="none" stroke="#FFB347" stroke-width="4" stroke-linejoin="round"/>

  <!-- Vertices (Points of Power) -->
  <!-- Profit (Top) -->
  <circle cx="200" cy="80" r="15" fill="#00D4FF"/>
  <text x="200" y="55" fill="#00D4FF" font-family="monospace" font-weight="bold" font-size="16" text-anchor="middle">PROFIT</text>

  <!-- Love (Bottom Left) -->
  <circle cx="80" cy="300" r="15" fill="#FF2D78"/>
  <text x="80" y="335" fill="#FF2D78" font-family="monospace" font-weight="bold" font-size="16" text-anchor="middle">LOVE</text>

  <!-- Tax (Bottom Right) -->
  <circle cx="320" cy="300" r="15" fill="#888"/>
  <text x="320" y="335" fill="#888" font-family="monospace" font-weight="bold" font-size="16" text-anchor="middle">TAX</text>

  <!-- Center Core -->
  <circle cx="200" cy="220" r="30" fill="none" stroke="#FFB347" stroke-width="2" stroke-dasharray="5,5"/>
  <text x="200" y="225" fill="#FFB347" font-family="monospace" font-weight="bold" font-size="20" text-anchor="middle">PLT</text>

  <!-- Status Text -->
  <text x="200" y="380" fill="#666" font-family="monospace" font-size="10" text-anchor="middle">SYSTEM STATUS: OPTIMIZING SOUL PROFIT</text>
</svg>
