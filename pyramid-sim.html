<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PLT Pyramid Sim - RTS Edition</title>
    <style>
        body { background: #000; color: #f0e68c; font-family: 'Georgia', serif; overflow: hidden; margin: 0; }
        #canvas { width: 100vw; height: calc(100vh - 180px); cursor: crosshair; image-rendering: pixelated; }

        /* RTS HUD STYLES */
        #rts-hud {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 180px;
            background: #2c2c2c;
            border-top: 6px solid #1a1a1a;
            display: flex;
            padding: 10px;
            box-sizing: border-box;
            background-image: url('https://www.transparenttextures.com/patterns/dark-leather.png'); /* Stone-like texture */
            box-shadow: 0 -10px 20px rgba(0,0,0,0.5);
        }

        .hud-panel {
            border: 4px solid #5d4037; /* Wood border */
            background: #3e2723;
            margin: 0 5px;
            padding: 10px;
            box-shadow: inset 0 0 15px #000;
            position: relative;
        }

        #mini-map-panel { width: 160px; height: 160px; display: flex; align-items: center; justify-content: center; }
        #mini-map { width: 140px; height: 140px; background: #0a2f0a; border: 2px solid #1a1a1a; position: relative; }

        #unit-info-panel { flex-grow: 1; display: flex; gap: 20px; }
        .unit-portrait { width: 100px; height: 120px; background: #1a1a1a; border: 2px solid #8d6e63; }
        .unit-stats { flex-grow: 1; }
        .unit-name { font-size: 1.4rem; color: #FFD700; text-shadow: 1px 1px #000; margin-bottom: 5px; border-bottom: 1px solid #5d4037; }

        #command-grid { width: 240px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; align-content: start; }
        .cmd-btn {
            background: #5d4037;
            border: 2px solid #8d6e63;
            aspect-ratio: 1;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.65rem;
            color: #ddd;
            text-transform: uppercase;
            font-weight: bold;
            transition: all 0.1s;
            text-align: center;
        }
        .cmd-btn:hover { background: #795548; color: #fff; border-color: #d7ccc8; }
        .cmd-btn:active { transform: translateY(2px); background: #3e2723; }

        #top-bar {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 30px;
            background: rgba(0,0,0,0.7);
            border-bottom: 2px solid #5d4037;
            display: flex;
            align-items: center;
            padding: 0 20px;
            font-size: 0.9rem;
            z-index: 10;
        }
        .resource { margin-right: 30px; display: flex; align-items: center; }
        .resource span { color: #FFD700; font-weight: bold; margin-left: 5px; }

        #log {
            position: absolute;
            top: 40px;
            left: 10px;
            width: 250px;
            max-height: 200px;
            pointer-events: none;
            font-size: 0.8rem;
            color: #fff;
            text-shadow: 1px 1px #000;
            overflow: hidden;
        }
    </style>
</head>
<body>
    <div id="top-bar">
        <div class="resource">GOLD: <span id="res-gold">1450</span></div>
        <div class="resource">WOOD: <span id="res-wood">820</span></div>
        <div class="resource">SOULS: <span id="res-souls">10/50</span></div>
        <div class="resource" style="margin-left: auto;">REALITY STABILITY: <span id="res-stability" style="color:#00ff00">98%</span></div>
    </div>

    <div id="log"></div>

    <canvas id="canvas"></canvas>

    <div id="rts-hud">
        <div id="mini-map-panel" class="hud-panel">
            <div id="mini-map">
                <!-- Mini map dots rendered by JS -->
            </div>
        </div>

        <div id="unit-info-panel" class="hud-panel">
            <div class="unit-portrait" id="portrait"></div>
            <div class="unit-stats">
                <div class="unit-name" id="selected-name">Bot-Commander</div>
                <div style="font-size: 0.8rem; opacity: 0.8;">Status: <span id="selected-status" style="color:#00ff00">Active</span></div>
                <div style="font-size: 0.8rem; opacity: 0.8;">Task: <span id="selected-task">Optimizing Profits</span></div>
                <div style="margin-top: 10px; height: 12px; width: 100%; background: #1a1a1a; border: 1px solid #5d4037; box-shadow: inset 0 0 5px #000;">
                    <div id="health-bar" style="width: 100%; height: 100%; background: linear-gradient(to bottom, #2ecc71, #27ae60); transition: width 0.5s;"></div>
                </div>
            </div>
        </div>

        <div id="command-grid" class="hud-panel">
            <div class="cmd-btn">Move</div>
            <div class="cmd-btn">Stop</div>
            <div class="cmd-btn" style="color:#aaa">Attack</div>
            <div class="cmd-btn">Guard</div>
            <div class="cmd-btn">Build</div>
            <div class="cmd-btn">Harvest</div>
            <div class="cmd-btn">Repair</div>
            <div class="cmd-btn">Scale</div>
            <div class="cmd-btn" style="color:#ffcc00">Soul Sync</div>
            <div class="cmd-btn">Reset</div>
            <div class="cmd-btn">Abort</div>
            <div class="cmd-btn" style="background:#1a1a1a">Menu</div>
        </div>
    </div>

    <script src="pyramid-sim.js"></script>
    <script>
        // UI Interaction Logic
        function updateUI() {
            const gold = document.getElementById('res-gold');
            gold.innerText = (parseInt(gold.innerText) + (Math.random() > 0.8 ? 1 : 0));

            // Randomize selection occasionally for visual variety
            if(Math.random() < 0.05 && agents.length > 0) {
                const a = agents[Math.floor(Math.random()*agents.length)];
                document.getElementById('selected-name').innerText = a.name;
                document.getElementById('selected-status').innerText = a.energy > 20 ? "Active" : "Low Energy";
                document.getElementById('selected-status').style.color = a.energy > 20 ? "#00ff00" : "#ff0000";
                document.getElementById('health-bar').style.width = a.energy + "%";
                document.getElementById('selected-task').innerText = ["Mining Gold", "Cutting Wood", "Building Future", "Syncing Souls"][Math.floor(Math.random()*4)];
            }
        }
        setInterval(updateUI, 1000);
    </script>
</body>
</html>
