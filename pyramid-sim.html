<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pyramid Sim - WorldBox Ultra</title>
    <style>
        body { background: #050505; color: #eee; font-family: monospace; overflow: hidden; margin: 0; }
        #canvas { width: 100vw; height: 100vh; image-rendering: pixelated; filter: saturate(1.4) brightness(1.2) contrast(1.1); }
        #ui { position: absolute; top: 15px; left: 15px; background: rgba(0,0,0,0.85); border: 2px solid #FFD700; padding: 15px; pointer-events: none; border-radius: 8px; box-shadow: 0 0 20px rgba(255,215,0,0.2); }
        .metric { font-size: 1.1rem; margin-bottom: 5px; }
        .gold { color: #FFD700; font-weight: bold; }
        #log { position: absolute; bottom: 15px; right: 15px; width: 300px; height: 120px; background: rgba(0,0,0,0.7); border: 1px solid #333; padding: 10px; font-size: 0.75rem; overflow-y: hidden; }
    </style>
</head>
<body>
    <div id="ui">
        <div class="metric">REALITY SCORE: <span id="sp" class="gold">0</span></div>
        <div class="metric">ACTIVE AGENTS: <span class="gold">10</span></div>
        <div style="font-size: 0.8rem; opacity: 0.8;">HABITAT: ULTRA RENDER ACTIVE</div>
    </div>
    <canvas id="canvas"></canvas>
    <div id="log"></div>
    <script>
        const c = document.getElementById('canvas'); const ctx = c.getContext('2d');
        const logPanel = document.getElementById('log');
        let w, h; const resize = () => { w = c.width = window.innerWidth; h = c.height = window.innerHeight; };
        window.onresize = resize; resize();

        const agents = [
            "Revenue-Soul", "Content-Factory", "Traffic-Soul", "Automation-Soul", "Djinie",
            "Deerg-Bot", "Doctor-Buht-Buht", "Library-Updater", "Bot-Commander", "Link-Checker"
        ].map((name, i) => ({
            name, x: Math.random()*w, y: Math.random()*h,
            vx: (Math.random()-0.5)*1.5, vy: (Math.random()-0.5)*1.5,
            color: ['#32CD32','#FFA500','#FF2D78','#00D4FF','#FFB347'][i%5],
            size: 8 + Math.random()*4
        }));

        function addLog(msg) {
            const d = document.createElement('div'); d.innerText = `> ${msg}`;
            logPanel.prepend(d); if(logPanel.children.length > 8) logPanel.lastChild.remove();
        }

        const loop = () => {
            // WorldBox Style Trails
            ctx.fillStyle = 'rgba(5, 5, 5, 0.15)'; ctx.fillRect(0, 0, w, h);

            agents.forEach(s => {
                s.x += s.vx; s.y += s.vy;
                if(s.x < 0 || s.x > w) s.vx *= -1;
                if(s.y < 0 || s.y > h) s.vy *= -1;

                // Ultra Render: Glow + Shadow
                ctx.save();
                ctx.shadowBlur = 20;
                ctx.shadowColor = s.color;
                ctx.fillStyle = s.color;
                ctx.fillRect(s.x - s.size/2, s.y - s.size/2, s.size, s.size);

                // Particle trail
                if(Math.random() < 0.1) {
                   ctx.fillStyle = 'rgba(255,255,255,0.3)';
                   ctx.fillRect(s.x, s.y, 2, 2);
                }
                ctx.restore();

                // Interactions
                agents.forEach(other => {
                    if(other === s) return;
                    let dist = Math.hypot(other.x-s.x, other.y-s.y);
                    if(dist < 80) {
                        ctx.strokeStyle = s.color;
                        ctx.globalAlpha = (80-dist)/80;
                        ctx.lineWidth = 1;
                        ctx.beginPath(); ctx.moveTo(s.x, s.y); ctx.lineTo(other.x, other.y); ctx.stroke();
                        ctx.globalAlpha = 1;
                    }
                });
            });

            if(Math.random() < 0.01) addLog(`${agents[Math.floor(Math.random()*10)].name} is processing reality...`);
            document.getElementById('sp').innerText = (parseFloat(document.getElementById('sp').innerText) + 0.1).toFixed(1);
            requestAnimationFrame(loop);
        };
        addLog("HABITAT STABILIZED. 10 AGENTS ONLINE.");
        loop();
    </script>
</body>
</html>
