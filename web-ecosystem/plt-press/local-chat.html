<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profit Chat - Local AI Habitat</title>
    <style>
        :root { --bg: #0D1117; --card-bg: #161B22; --text: #C9D1D9; --pink: #FF2D78; --cyan: #00D4FF; --gold: #FFB347; --border: #30363D; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, system-ui, sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { padding: 1rem; background: var(--card-bg); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .logo { font-weight: 800; color: var(--gold); }
        #chat-container { flex: 1; overflow-y: auto; padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem; }
        .message { max-width: 85%; padding: 0.8rem 1rem; border-radius: 12px; line-height: 1.4; animation: fadeIn 0.2s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .user { align-self: flex-end; background: #21262D; border: 1px solid var(--border); }
        .bot { align-self: flex-start; background: #161B22; border-left: 3px solid var(--pink); }
        .input-area { padding: 1rem; background: var(--card-bg); display: flex; gap: 10px; }
        input { flex: 1; background: var(--bg); border: 1px solid var(--border); padding: 0.6rem 1rem; border-radius: 20px; color: #fff; outline: none; }
        button { background: var(--pink); color: white; border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; }
    </style>
</head>
<body>
    <header><div class="logo">💰 PROFIT CHAT</div><div id="status" style="font-size:0.7rem">Knowledge Engine Active</div></header>
    <div id="chat-container"><div class="message bot">System active. How can we expand reality?</div></div>
    <form class="input-area" id="form"><input type="text" id="input" placeholder="Type command..."><button type="submit">></button></form>
    <script>
        const engine = { "what is plt": "SOUL_PROFIT = PROFIT + LOVE - TAX.", "hello": "Greetings. Ready for expansion." };
        document.getElementById('form').onsubmit = (e) => {
            e.preventDefault(); const val = document.getElementById('input').value; if(!val) return;
            const u = document.createElement('div'); u.className='message user'; u.innerText=val;
            document.getElementById('chat-container').appendChild(u);
            const b = document.createElement('div'); b.className='message bot';
            b.innerText = engine[val.toLowerCase()] || "Pattern recognized. Intelligence expanded.";
            document.getElementById('chat-container').appendChild(b);
            document.getElementById('input').value='';
            document.getElementById('chat-container').scrollTop = 99999;
        };
    </script>
</body>
</html>
